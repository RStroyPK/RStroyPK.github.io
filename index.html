<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Р-Строй | Портфолио строительных работ</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Основные стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 
    ============================================================
    САЙТ СОБИРАЕТСЯ ИЗ БЛОКОВ
    ============================================================
    Каждый блок находится в папке /blocks/ и подключается через 
    конструкцию включения. При редактировании блоков не нужно 
    трогать другие части сайта.
    ============================================================
-->

<!-- БЛОК 1: ШАПКА (логотип, контакты) -->
<div id="header-container"></div>

<!-- БЛОК 2: ГЛАВНЫЙ ЭКРАН (HERO) -->
<div id="hero-container"></div>

<!-- БЛОК 3: ПОРТФОЛИО С ГАЛЕРЕЕЙ -->
<div id="portfolio-container"></div>

<!-- БЛОК 4: НАВЫКИ И ПОДХОД -->
<div id="skills-container"></div>

<!-- БЛОК 5: ОТЗЫВЫ/БЛАГОДАРНОСТИ -->
<div id="reviews-container"></div>

<!-- БЛОК 6: ФОРМА СВЯЗИ -->
<div id="contact-container"></div>

<!-- БЛОК 7: ПОДВАЛ -->
<div id="footer-container"></div>

<!-- Подключаем JavaScript для загрузки блоков -->
<link rel="stylesheet" href="style.css">
<script src="js/script.js"></script>
<!-- 
    КОММЕНТАРИЙ: КАК НАСТРАИВАТЬ БЛОКИ
    ============================================================
    1. Все блоки лежат в папке /blocks/ с понятными именами.
    2. Внутри каждого блока есть подробные комментарии:
       - какие элементы можно менять
       - как добавлять новые фото
       - как менять цвета и текст
    3. JavaScript в файле /js/script.js загружает блоки на страницу
       и инициализирует галерею после загрузки всех блоков.
    ============================================================
-->
</body>
</html>
