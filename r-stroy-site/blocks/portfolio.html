    БЛОК: ПОРТФОЛИО С ГАЛЕРЕЕЙ
    ============================================================
    ЭТОТ БЛОК — КОНТЕЙНЕР. САМА ГАЛЕРЕЯ СОЗДАЁТСЯ ЧЕРЕЗ JAVASCRIPT.
    
    КАК ДОБАВИТЬ СВОИ ФОТОГРАФИИ:
    1. Откройте файл js/script.js
    2. Найдите в нём массив "albums" (он в самом начале)
    3. В массиве albums перечислены категории работ.
       У каждой категории есть:
       - title — название (показывается на кнопке)
       - images — список имён файлов с фото
    4. Все фотографии положите в папку "images"
    5. Укажите в массиве точные имена файлов (с расширением)
    
    ПРИМЕР ДОБАВЛЕНИЯ НОВОЙ КАТЕГОРИИ:
    {
        title: "Новая категория",
        images: [
            "images/новое-фото-1.jpg",
            "images/новое-фото-2.jpg"
        ]
    },
    ============================================================
-->
